            - name: Verify deployment secrets
              run: |
                  if [ -z "$BREF_TOKEN" ]; then
                      echo "::error::Add BREF_TOKEN to the production environment or repository secrets."
                      exit 1
                  fi
                  if [ -z "$LEAD_FORWARDER_KEY" ]; then
                      echo "::error::Add LEAD_FORWARDER_KEY to the production environment or repository secrets."
                      exit 1
                  fi

            - name: Install Bref Cloud CLI
              run: composer global require bref/cli:^1.1 --prefer-dist --no-interaction --no-progress

            - name: Deploy production
              run: composer deploy:prod
