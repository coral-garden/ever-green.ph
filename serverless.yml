service: ever-green-ph

bref:
    team: coral-garden-software

provider:
    name: aws
    region: ap-southeast-1
    tags:
        Application: Ever Green PH
        Environment: ${sls:stage}
        ManagedBy: serverless
    stackTags:
        Application: Ever Green PH
        Environment: ${sls:stage}
        ManagedBy: serverless
    iam:
        role:
            statements:
                - Effect: Allow
                  Action:
                      - ses:SendEmail
                      - ses:SendRawEmail
                  Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/simonphconsult@gmail.com
    environment:
        APP_NAME: ${param:appName}
        APP_ENV: ${param:appEnv}
        APP_KEY: ${ssm:/ever-green-ph/${sls:stage}/APP_KEY}
        APP_DEBUG: ${param:debug}
        APP_URL: ${construct:website.url}
        ASSET_URL: ${construct:website.url}
        SESSION_DRIVER: cookie
        CACHE_STORE: array
        QUEUE_CONNECTION: sync
        FILESYSTEM_DISK: local
        LOG_CHANNEL: stderr
        LOG_STDERR_FORMATTER: Bref\Monolog\CloudWatchFormatter
        LOG_LEVEL: info
        MAIL_MAILER: ses-v2
        MAIL_FROM_ADDRESS: simonphconsult@gmail.com
        MAIL_FROM_NAME: ${param:appName}
        LEAD_MAIL_TO: simonphconsult@gmail.com
        LEAD_FORWARDER_URL: https://conduit.solar/api/v1/leads
        LEAD_FORWARDER_KEY: ${ssm:/ever-green-ph/${sls:stage}/LEAD_FORWARDER_KEY}
        LEAD_FORWARDER_ORIGIN: ${construct:website.url}
        BILL_PARSER_URL: https://conduit.solar/api/v1/bill-parser
        BILL_PARSER_KEY: ${ssm:/ever-green-ph/${sls:stage}/BILL_PARSER_KEY}
        BILL_PARSER_ORIGIN: ${construct:website.url}

functions:
    web:
        handler: public/index.php
        runtime: php-85-fpm
        timeout: 28
        events:
            - httpApi: '*'
            - schedule:
                  rate: rate(5 minutes)
                  input:
                      warmer: true

    artisan:
        handler: artisan
        runtime: php-85-console
        timeout: 720

constructs:
    website:
        type: server-side-website
        versionedAssets: true
        assets:
            '/assets/*': public/assets
            '/favicon.ico': public/favicon.ico
            '/robots.txt': public/robots.txt
            '/sitemap.xml': public/sitemap.xml

params:
    default:
        appName: 'Ever Green PH'
        appEnv: ${sls:stage}
        debug: 0
    prod:
        appEnv: production
    dev:
        appName: 'Ever Green PH [DEV]'
        debug: 1

package:
    patterns:
        - '!.env*'
        - '!.agents/**'
        - '!.claude/**'
        - '!.codex/**'
        - '!.git/**'
        - '!.github/**'
        - '!.serverless/**'
        - '!node_modules/**'
        - '!original/**'
        - '!storage/**'
        - '!tests/**'
        - '!database/*.sqlite'
        - '!vendor/bin/**'

plugins:
    - ./vendor/bref/bref
    - serverless-lift
